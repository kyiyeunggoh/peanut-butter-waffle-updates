name: Daily Telegram Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.1-flash-lite' }}
          MAX_DAILY_GEMINI_COST_USD: ${{ vars.MAX_DAILY_GEMINI_COST_USD || '0.02' }}
          GEMINI_INPUT_PRICE_PER_1M: ${{ vars.GEMINI_INPUT_PRICE_PER_1M || '0.25' }}
          GEMINI_OUTPUT_PRICE_PER_1M: ${{ vars.GEMINI_OUTPUT_PRICE_PER_1M || '1.50' }}
          GEMINI_MAX_OUTPUT_TOKENS: ${{ vars.GEMINI_MAX_OUTPUT_TOKENS || '600' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '90' }}
          MAX_ARTICLE_AGE_DAYS: ${{ vars.MAX_ARTICLE_AGE_DAYS || '90' }}
          SEEN_RETENTION_DAYS: ${{ vars.SEEN_RETENTION_DAYS || '365' }}
          DIGEST_SHORTLIST_COUNT: ${{ vars.DIGEST_SHORTLIST_COUNT || '20' }}
          MIN_ARTICLES_TO_SEND: ${{ vars.MIN_ARTICLES_TO_SEND || '3' }}
          MAX_ARTICLES_TO_SEND: ${{ vars.MAX_ARTICLES_TO_SEND || '10' }}
        run: python src/main.py

      - name: Save seen items
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json data/cost_log.json data/url_cache.json data/quality_cache.json data/candidate_cache.json data/ranking_runs.json
          git diff --cached --quiet || git commit -m "Update seen digest items"
          git push
