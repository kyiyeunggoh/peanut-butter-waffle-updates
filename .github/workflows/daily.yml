name: Daily Telegram Digest

on:
  workflow_dispatch:
    inputs:
      require_fresh_fetch:
        description: "Disable candidate-cache fallback so manual sends must fetch fresh Google News / academic-source results"
        required: false
        default: "true"
        type: boolean
      force_send_even_if_already_sent_today:
        description: "Bypass the daily send guard and allow another real Telegram send today"
        required: false
        default: "false"
        type: boolean
  schedule:
    # Staggered attempts for 08:13, 08:43, and 09:13 Asia/Singapore.
    # GitHub scheduled workflows can be delayed or occasionally dropped;
    # the daily guard below prevents duplicate sends when an earlier attempt
    # already completed.
    - cron: "13 0 * * *"
    - cron: "43 0 * * *"
    - cron: "13 1 * * *"

permissions:
  contents: write

concurrency:
  group: daily-telegram-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check daily send guard
        id: daily_guard
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from zoneinfo import ZoneInfo

          force_send = os.environ.get("FORCE_SEND_EVEN_IF_ALREADY_SENT_TODAY", "").lower() == "true"
          today_sg = datetime.now(ZoneInfo("Asia/Singapore")).date()
          already_sent = False
          reasons = []

          def parse_timestamp(value):
              if not value:
                  return None
              try:
                  parsed = datetime.fromisoformat(str(value).replace("Z", "+00:00"))
              except ValueError:
                  return None
              if parsed.tzinfo is None:
                  parsed = parsed.replace(tzinfo=timezone.utc)
              return parsed.astimezone(ZoneInfo("Asia/Singapore")).date()

          seen_path = Path("data/seen.json")
          if seen_path.exists():
              try:
                  seen = json.loads(seen_path.read_text())
                  records = []
                  for section in ("urls", "titles", "stories"):
                      records.extend((seen.get(section) or {}).values())
                  if any(parse_timestamp(record.get("sent_at")) == today_sg for record in records):
                      already_sent = True
                      reasons.append("seen.json has sent_at for today")
              except json.JSONDecodeError:
                  pass

          cost_log_path = Path("data/cost_log.json")
          if cost_log_path.exists():
              try:
                  cost_log = json.loads(cost_log_path.read_text())
                  for run in cost_log.get("runs", []):
                      if run.get("mode") == "send" and run.get("date") == today_sg.isoformat():
                          already_sent = True
                          reasons.append("cost_log.json has send run for today")
                          break
              except json.JSONDecodeError:
                  pass

          skip = already_sent and not force_send
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"skip={'true' if skip else 'false'}\n")
              output.write(f"today_sg={today_sg.isoformat()}\n")
              output.write(f"reason={'; '.join(reasons) if reasons else 'not previously sent today'}\n")

          print(f"daily_guard skip={skip} force_send={force_send} today_sg={today_sg.isoformat()} reason={'; '.join(reasons) if reasons else 'not previously sent today'}")
          PY
        env:
          FORCE_SEND_EVEN_IF_ALREADY_SENT_TODAY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_send_even_if_already_sent_today && 'true' || 'false' }}

      - name: Install dependencies
        if: steps.daily_guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Send digest
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.1-flash-lite' }}
          MAX_DAILY_GEMINI_COST_USD: ${{ vars.MAX_DAILY_GEMINI_COST_USD || '0.02' }}
          GEMINI_INPUT_PRICE_PER_1M: ${{ vars.GEMINI_INPUT_PRICE_PER_1M || '0.25' }}
          GEMINI_OUTPUT_PRICE_PER_1M: ${{ vars.GEMINI_OUTPUT_PRICE_PER_1M || '1.50' }}
          GEMINI_MAX_OUTPUT_TOKENS: ${{ vars.GEMINI_MAX_OUTPUT_TOKENS || '900' }}
          GEMINI_MAX_ATTEMPTS: ${{ vars.GEMINI_MAX_ATTEMPTS || '3' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '30' }}
          MAX_ARTICLE_AGE_DAYS: ${{ vars.MAX_ARTICLE_AGE_DAYS || '4' }}
          SEEN_RETENTION_DAYS: ${{ vars.SEEN_RETENTION_DAYS || '365' }}
          DIGEST_SHORTLIST_COUNT: ${{ vars.DIGEST_SHORTLIST_COUNT || '20' }}
          MIN_ARTICLES_TO_SEND: ${{ vars.MIN_ARTICLES_TO_SEND || '1' }}
          MAX_ARTICLES_TO_SEND: ${{ vars.MAX_ARTICLES_TO_SEND || '5' }}
          DISABLE_CANDIDATE_CACHE_FALLBACK: ${{ github.event_name == 'workflow_dispatch' && inputs.require_fresh_fetch && 'true' || 'false' }}
        run: python src/main.py

      - name: Save seen items
        if: steps.daily_guard.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json data/cost_log.json data/url_cache.json data/quality_cache.json data/candidate_cache.json data/ranking_runs.json
          git diff --cached --quiet && exit 0
          git commit -m "Update seen digest items"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
